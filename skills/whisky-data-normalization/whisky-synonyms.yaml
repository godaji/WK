  배럴: ["베럴"]                       # barrel
  캐스크: ["케스크"]                    # cask  (쉐리케스크→쉐리캐스크→셰리캐스크)
  셰리: ["쉐리"]                        # sherry
  몰트: ["모트"]                        # malt (OCR 탈락)
  싱글몰트: ["싱글 몰트", "싱글트", "싱글 모트"]   # single malt 표기흔들림 (싱글 토큰은 보존)

  # 버번/위스키 음차 오류 (ASR: '버번'→'법원', '위스키'→'유스키/이스키')
