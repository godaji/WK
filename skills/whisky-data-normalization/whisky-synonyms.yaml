  루비: ["누루비", "누비"]              # 블랙 '루비' (Black Ruby)

  # 짐빔 / 잭다니엘 OCR 변형
  짐빔: ["진빔", "진빈"]                # Jim Beam (≠ '진'=gin)
  화이트: ["하이트"]
  잭다니엘: ["잭다니엘스", "잭다니엘시", "잭다니에스", "잭다니에", "잭다니의", "잭다니스",
            "잭 다니엘스", "잭 다니엘", "잭 다니에", "잭 다니"]

# ─────────────────────────────────────────────────────────────────────────
# 2) noise_patterns — 매칭 전에 제거하는 부속 토큰(용량/포장/가격/마케팅/대괄호)
#    정규식(파이썬 re). 제품 식별과 무관한 잡음만. 공백으로 치환.
# ─────────────────────────────────────────────────────────────────────────
noise_patterns:
  - "\\[[^\\]]*\\]"                 # [매장행사중 재고확인] 등 대괄호 주석
  - "&gt;"                          # HTML escape 잔재
  - ">>"
  - "\\d+\\s*mml"                   # 750mml 오타
  - "\\d+\\s*ml"
  - "\\d+\\.\\d+\\s*l"              # 1.75L
  - "\\d+\\s*l플러스"
  - "\\d+\\s*l9"                    # '1L9' (용량+가격 머지 잔재)
  - "\\d+\\s*l4"
  - "\\b1l\\b"
  - "\\d+만\\d*"                    # 가격 잔재 '67만', '14만1'
  - "전용잔 패키지"
  - "전용 패키지"
  - "전용잔"
  - "잔세트"
  - "패키지"
  - "두 개입"
