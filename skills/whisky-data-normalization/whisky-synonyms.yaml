#    주의:  치환은 부분문자열 단위. 정규형이 다른 변형의 부분문자열이면
#           긴 변형부터 처리하므로 무한팽창은 없으나, 정규형이 변형의
#           부분문자열인 경우는(예 '에버펠'→'에버펠디') 여기 두지 말고
#           products 의 match 토큰으로 처리한다.
# ─────────────────────────────────────────────────────────────────────────
token_synonyms:
