<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <!-- 배경: 둥근 사각형, DreamJar 다크 퍼플 -->
  <rect width="512" height="512" rx="112" fill="#1a1a2e"/>

  <!-- 저금통(jar) 몸통 -->
  <rect x="146" y="170" width="220" height="240" rx="38" fill="#252545" stroke="#7c6ff7" stroke-width="10"/>

  <!-- 뚜껑 -->
  <rect x="176" y="136" width="160" height="46" rx="16" fill="#7c6ff7"/>
  <!-- 뚜껑 손잡이 -->
  <rect x="230" y="116" width="52" height="28" rx="12" fill="#9d93f8"/>

  <!-- 채워진 적립분 (그라데이션 퍼플) -->
  <rect x="160" y="300" width="192" height="96" rx="28" fill="#7c6ff7" opacity="0.45"/>
  <rect x="160" y="300" width="192" height="32" rx="12" fill="#9d93f8" opacity="0.35"/>

  <!-- 동전 투입구 -->
  <rect x="228" y="200" width="56" height="12" rx="6" fill="#0f0f1a"/>

  <!-- 반짝임 (dream sparkles) -->
  <!-- 큰 별 좌상 -->
  <g transform="translate(108,110)" fill="#9d93f8">
    <rect x="8" y="0" width="4" height="20" rx="2"/>
    <rect x="0" y="8" width="20" height="4" rx="2"/>
  </g>
  <!-- 작은 별 우상 -->
  <g transform="translate(390,90)" fill="#7c6ff7" opacity="0.8">
    <rect x="5" y="0" width="3" height="13" rx="1.5"/>
    <rect x="0" y="5" width="13" height="3" rx="1.5"/>
  </g>
  <!-- 작은 별 우중 -->
  <g transform="translate(400,220)" fill="#9d93f8" opacity="0.6">
    <rect x="4" y="0" width="3" height="11" rx="1.5"/>
    <rect x="0" y="4" width="11" height="3" rx="1.5"/>
  </g>
  <!-- 원형 반짝임 -->
  <circle cx="96" cy="260" r="5" fill="#7c6ff7" opacity="0.5"/>
  <circle cx="420" cy="340" r="4" fill="#9d93f8" opacity="0.4"/>
</svg>
