# whisky-synonyms.yaml — 위스키 동의어/표기변형 정의 (CMPA-22 핵심 자산)
#
# 목적: 크롤링·OCR·ASR로 들어온 "같은 술의 다른 표기"를 whisky-list.csv 의 정본 id 로
#       모으기(dedup) 위한 규칙 파일. 예) "러셀 리저브 싱글 베럴" 과 "러셀 리저브 싱글 배럴"
#       이 서로 다른 상품으로 잡히던 문제를 해결한다.
#
# 사용: scripts 의 normalize_whisky_name.py 가 이 파일을 읽어
#       canonicalize(raw_name) -> whisky-list id 를 돌려준다.
#       이 파일이 동의어 정의의 "정본(source of truth)" 이고, 코드는 해석기일 뿐이다.
#
# 정규화 파이프라인 순서: (1) token_synonyms 치환(긴 변형 우선) -> (2) noise_patterns 제거
#                         -> (3) 공백 정리 -> (4) products 의 match/not 토큰 부분일치 평가(위→아래, 먼저 맞는 것 채택)
#
# 신뢰도 표기: low 인 매칭(OCR/ASR 음차 추정)은 normalize_whisky_name.py 리포트에서 별도 표시.

version: 1
generated_for: CMPA-22
canonical_list: whisky-list.csv   # id ↔ name_ko 정본

# ─────────────────────────────────────────────────────────────────────────
# 1) token_synonyms — 상품 불문 공통 표기/철자/음차 변형 통일
#    형식:  정규형: [변형1, 변형2, ...]   (변형을 정규형으로 치환)
#    주의:  치환은 부분문자열 단위. 정규형이 다른 변형의 부분문자열이면
#           긴 변형부터 처리하므로 무한팽창은 없으나, 정규형이 변형의
#           부분문자열인 경우는(예 '에버펠'→'에버펠디') 여기 두지 말고
#           products 의 match 토큰으로 처리한다.
# ─────────────────────────────────────────────────────────────────────────
token_synonyms:
  # 배럴/캐스크/셰리 계열 (가장 흔한 충돌원)
  배럴: ["베럴"]                       # barrel
  캐스크: ["케스크"]                    # cask  (쉐리케스크→쉐리캐스크→셰리캐스크)
  셰리: ["쉐리"]                        # sherry
  몰트: ["모트"]                        # malt (OCR 탈락)
  싱글몰트: ["싱글 몰트", "싱글트", "싱글 모트"]   # single malt 표기흔들림 (싱글 토큰은 보존)

  # 버번/위스키 음차 오류 (ASR: '버번'→'법원', '위스키'→'유스키/이스키')
  버번위스키: ["버뉴스키", "버유스키", "법원위스키", "법원이스키", "법원유스키", "버번 위스키"]
  버번: ["법원"]
  위스키: ["유스키", "이스키"]

