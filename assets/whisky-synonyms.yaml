  그린라벨: ["그인라"]
  "2005": ["2 5", "2 호"]              # 달모어 2005 빈티지 OCR

  # 브랜드/익스프레션 음차·철자 변형
  가쿠빈: ["각쿠빈"]                    # 산토리 角瓶
  아부나흐: ["아브나흐", "아브나오", "아브나르", "아브나우", "아브나후", "아부나"]   # Aberlour A'bunadh
